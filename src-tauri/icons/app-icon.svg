<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" />

  <!-- Left sheet -->
  <rect x="72" y="100" width="170" height="312" rx="12" fill="white" opacity="0.95" />
  <!-- Left grid lines -->
  <line x1="72" y1="152" x2="242" y2="152" stroke="#e2e8f0" stroke-width="2" />
  <line x1="72" y1="204" x2="242" y2="204" stroke="#e2e8f0" stroke-width="2" />
  <line x1="72" y1="256" x2="242" y2="256" stroke="#e2e8f0" stroke-width="2" />
  <line x1="72" y1="308" x2="242" y2="308" stroke="#e2e8f0" stroke-width="2" />
  <line x1="72" y1="360" x2="242" y2="360" stroke="#e2e8f0" stroke-width="2" />
  <line x1="145" y1="100" x2="145" y2="412" stroke="#e2e8f0" stroke-width="2" />

  <!-- Left data (some highlighted as deleted) -->
  <rect x="74" y="258" width="166" height="48" fill="#fee2e2" rx="2" />
  <rect x="74" y="310" width="166" height="48" fill="#fef9c3" rx="2" />

  <!-- Right sheet -->
  <rect x="270" y="100" width="170" height="312" rx="12" fill="white" opacity="0.95" />
  <!-- Right grid lines -->
  <line x1="270" y1="152" x2="440" y2="152" stroke="#e2e8f0" stroke-width="2" />
  <line x1="270" y1="204" x2="440" y2="204" stroke="#e2e8f0" stroke-width="2" />
  <line x1="270" y1="256" x2="440" y2="256" stroke="#e2e8f0" stroke-width="2" />
  <line x1="270" y1="308" x2="440" y2="308" stroke="#e2e8f0" stroke-width="2" />
  <line x1="270" y1="360" x2="440" y2="360" stroke="#e2e8f0" stroke-width="2" />
  <line x1="343" y1="100" x2="343" y2="412" stroke="#e2e8f0" stroke-width="2" />

  <!-- Right data (some highlighted as added) -->
  <rect x="272" y="258" width="166" height="48" fill="#dcfce7" rx="2" />
  <rect x="272" y="362" width="166" height="48" fill="#dcfce7" rx="2" />

  <!-- Center merge arrow -->
  <circle cx="256" cy="256" r="28" fill="url(#green)" />
  <path d="M244 256 L268 256 M260 248 L268 256 L260 264" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Title bar -->
  <rect x="72" y="60" width="370" height="32" rx="6" fill="white" opacity="0.2" />
  <circle cx="96" cy="76" r="5" fill="#ef4444" opacity="0.7" />
  <circle cx="116" cy="76" r="5" fill="#f59e0b" opacity="0.7" />
  <circle cx="136" cy="76" r="5" fill="#22c55e" opacity="0.7" />
</svg>
